services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: osm-boundary-checker-germany:latest
    environment:
      PORT: 4173
      TZ: Europe/Berlin
      PIPELINE_TIMEZONE: Europe/Berlin
      DATA_ROOT: /data
    ports:
      - '4173:4173'
    volumes:
      - boundary_checker_data:/data
    restart: unless-stopped

  pipeline:
    image: osm-boundary-checker-germany:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TZ: Europe/Berlin
      PIPELINE_TIMEZONE: Europe/Berlin
      CI: '1'
      DATA_ROOT: /data
    volumes:
      - boundary_checker_data:/data
    command: ['bun', 'run', 'pipeline:nightly']
    profiles: ['pipeline']

volumes:
  boundary_checker_data:
