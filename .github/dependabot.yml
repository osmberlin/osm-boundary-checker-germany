# FMC Dependabot defaults — https://github.com/FixMyBerlin/fixmyskills (skills/tech-stack)
# Bun workspace monorepo (scripts/, report/); single lockfile at repo root.
version: 2
updates:
  - package-ecosystem: bun
    directories:
      - /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    cooldown:
      default-days: 5
    open-pull-requests-limit: 1
    exclude-paths:
      - .cursor/**
    commit-message:
      prefix: chore
      include: scope
    groups:
      security-dev-tools:
        applies-to: security-updates
        patterns:
          - 'oxlint*'
          - 'oxfmt*'
          - 'vitest*'
          - '@playwright/*'
          - '@testing-library/*'
          - 'knip*'
          - 'husky*'
          - '@types/*'
          - 'typescript'
          - '@typescript/typescript-*'
          - 'eslint*'

      shared-monorepo-tools:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - 'oxlint*'
          - 'oxfmt*'
          - '@types/bun'

      app-dev-minor-patch:
        applies-to: version-updates
        patterns:
          - '@babel/*'
          - '@clack/*'
          - '@eslint/*'
          - '@heroicons/*'
          - '@playwright/*'
          - '@rolldown/*'
          - '@testing-library/*'
          - '@total-typescript/*'
          - '@vitejs/*'
          - 'babel-plugin-*'
          - 'bun-plugin-*'
          - 'eslint-*'
          - 'globals'
          - 'husky'
          - 'jsdom'
          - 'knip'
          - 'oxfmt'
          - 'oxlint*'
          - 'typescript-eslint'
          - 'vitest'
          - 'vite'
          - '@types/*'
          - 'typescript'
          - '@typescript/typescript-*'
        update-types:
          - minor
          - patch

      app-framework-minor-patch:
        applies-to: version-updates
        patterns:
          - '@date-fns/*'
          - '@headlessui/*'
          - '@tanstack/*'
          - '@tailwindcss/*'
          - 'tailwindcss'
          - '@turf/*'
          - 'date-fns'
          - 'maplibre-gl'
          - 'react'
          - 'react-dom'
          - '@types/react*'
          - 'react-map-gl'
          - 'recharts'
          - 'zod'
          - 'zustand'
        update-types:
          - minor
          - patch

      scripts-geo-minor-patch:
        applies-to: version-updates
        patterns:
          - 'flatgeobuf'
          - 'jsts'
          - 'jszip'
          - 'osm2geojson-ultra'
          - 'pmtiles'
          - 'proj4'
          - 'read-excel-file'
        update-types:
          - minor
          - patch

      app-prod-misc-patch:
        applies-to: version-updates
        update-types:
          - patch
        patterns:
          - '*'
        exclude-patterns:
          - '@date-fns/*'
          - '@headlessui/*'
          - '@tanstack/*'
          - '@tailwindcss/*'
          - '@turf/*'
          - 'date-fns'
          - 'flatgeobuf'
          - 'jsts'
          - 'jszip'
          - 'maplibre-gl'
          - 'osm2geojson-ultra'
          - 'pmtiles'
          - 'proj4'
          - 'react'
          - 'react-dom'
          - 'react-map-gl'
          - 'read-excel-file'
          - 'recharts'
          - 'zod'
          - 'zustand'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/Berlin
    cooldown:
      default-days: 5
    open-pull-requests-limit: 1
    # dtolnay/rust-toolchain uses Rust version tags (e.g. 1.86.0), not action semver — ignore entirely.
    ignore:
      - dependency-name: 'dtolnay/rust-toolchain'
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
