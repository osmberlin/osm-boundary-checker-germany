name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'report/**'
  workflow_run:
    workflows: ['Refresh Datasets']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  REPORT_RUNTIME_ARTIFACT_NAME: report-runtime-last-good
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      DATA_ROOT: ${{ github.workspace }}/.artifact-restore/.artifact-runtime-report
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Download refresh artifact from triggering run
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: data-refresh.yml
          name: ${{ env.REPORT_RUNTIME_ARTIFACT_NAME }}
          run_id: ${{ github.event.workflow_run.id }}
          search_artifacts: false
          path: .artifact-restore
          if_no_artifact_found: fail

      - name: Download latest refresh artifact
        if: github.event_name != 'workflow_run'
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: data-refresh.yml
          branch: main
          name: ${{ env.REPORT_RUNTIME_ARTIFACT_NAME }}
          search_artifacts: true
          path: .artifact-restore
          if_no_artifact_found: fail

      - name: Prepare static snapshot assets
        run: bun run report:sync-runtime-assets

      - name: Validate non-empty area index
        run: bun run scripts/ci/validate-areas-index.ts

      - name: Build static report shell
        run: bun run report:build:app

      - name: PMTiles byte-range smoke test
        run: bun run scripts/ci/pmtiles-byte-range-smoke-test.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: report/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
