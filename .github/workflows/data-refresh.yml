name: Refresh Datasets

on:
  workflow_dispatch:
  schedule:
    # Wed/Fri/Sat/Sun at 03:00 UTC for fresh weekend data without daily runs.
    - cron: '0 3 * * 0,3,5,6'

permissions:
  contents: read
  actions: read

env:
  DATASET_ARTIFACT_NAME: datasets-last-good
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: refresh-datasets-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Install system tools for pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool gdal-bin tippecanoe unzip

      - name: Run nightly pipeline
        run: bun run scripts/ci/run-nightly-pipeline-with-retry.ts
        env:
          CI: '1'

      - name: Prepare static report snapshot
        run: bun run report:sync-runtime-assets

      - name: Validate snapshot output
        run: bun run scripts/ci/validate-refresh-snapshot.ts

      - name: Stage runtime artifact payload
        run: bun run scripts/ci/stage-runtime-artifact-payload.ts

      - name: Upload reusable dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          path: .artifact-runtime
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 4
