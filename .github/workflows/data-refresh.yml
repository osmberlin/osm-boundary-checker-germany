name: Refresh Datasets

on:
  workflow_dispatch:
  schedule:
    # Wed/Fri/Sat/Sun at 03:00 UTC for fresh weekend data without daily runs.
    - cron: '0 3 * * 0,3,5,6'

permissions:
  contents: read
  actions: read

env:
  DATASET_ARTIFACT_NAME: datasets-last-good
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: refresh-datasets-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Install system tools for pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool gdal-bin tippecanoe unzip

      - name: Run nightly pipeline
        run: |
          retry() {
            local attempts="$1"
            shift
            local n=1
            while true; do
              "$@" && return 0
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              n=$((n + 1))
              local wait_seconds=$((n * 30))
              echo "Retry $n/$attempts in ${wait_seconds}s: $*"
              sleep "$wait_seconds"
            done
          }

          retry 2 bun run pipeline:nightly
        env:
          CI: '1'

      - name: Prepare static report snapshot
        run: bun run report:sync-runtime-assets

      - name: Validate snapshot output
        run: |
          test -f areas.gen.json
          test -d report/public/datasets
          node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('areas.gen.json','utf8')); if(!Array.isArray(data.areas)||data.areas.length===0){throw new Error('areas.gen.json has no areas after refresh')} console.log('areas:', data.areas.length)"

      - name: Stage runtime artifact payload
        run: |
          set -euo pipefail
          rm -rf .artifact-runtime
          mkdir -p .artifact-runtime/datasets .artifact-runtime/data
          cp -R datasets/. .artifact-runtime/datasets/
          if [ -d data ]; then
            cp -R data/. .artifact-runtime/data/
          fi

      - name: Upload reusable dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          path: |
            .artifact-runtime/datasets
            .artifact-runtime/data
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 4
