name: Refresh Datasets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: read
  actions: read

env:
  DATASET_ARTIFACT_NAME: datasets-last-good
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: refresh-datasets-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Install system tools for pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool gdal-bin tippecanoe unzip

      - name: Bootstrap official reference data for fresh runner
        run: |
          retry() {
            local attempts="$1"
            shift
            local n=1
            while true; do
              "$@" && return 0
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              n=$((n + 1))
              local wait_seconds=$((n * 15))
              echo "Retry $n/$attempts in ${wait_seconds}s: $*"
              sleep "$wait_seconds"
            done
          }

          retry 3 bun run bkg:download
          retry 2 bun run bkg:extract
          retry 3 bun run download:official
        env:
          CI: '1'

      - name: Run nightly pipeline
        run: |
          retry() {
            local attempts="$1"
            shift
            local n=1
            while true; do
              "$@" && return 0
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              n=$((n + 1))
              local wait_seconds=$((n * 30))
              echo "Retry $n/$attempts in ${wait_seconds}s: $*"
              sleep "$wait_seconds"
            done
          }

          retry 2 bun run pipeline:nightly
        env:
          CI: '1'

      - name: Prepare static report snapshot
        run: bun run --filter report prepare-static-snapshot

      - name: Generate area index
        run: bun run report:generate-areas

      - name: Validate snapshot output
        run: |
          test -f areas.gen.json
          test -d report/public/datasets

      - name: Upload reusable dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          path: |
            areas.gen.json
            report/public/datasets
            report/public/data
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
