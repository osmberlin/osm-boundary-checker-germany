name: Refresh Datasets

on:
  workflow_dispatch:
  # If you change this schedule (cron or timezone), update the same cadence everywhere it is described:
  # - report/src/i18n/de.ts → de.status.dataRefreshCadence
  # - report/src/pages/ProcessingStatus.tsx (lead paragraph)
  # - docs/nightly-runtime-rate-limits.md (scheduled refresh bullets)
  schedule:
    # Sun/Wed/Fri/Sat at 04:00 Europe/Berlin (DST-aware).
    - cron: '0 4 * * 0,3,5,6'
      timezone: 'Europe/Berlin'

permissions:
  contents: write
  actions: read

env:
  REPORT_RUNTIME_ARTIFACT_NAME: report-runtime-last-good
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: refresh-datasets-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Download previous rust sidecar metadata
        id: previous-rust-metadata
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: data-refresh.yml
          branch: main
          name: rust-sidecar-metadata-last-good
          search_artifacts: true
          path: .previous-artifact
          if_no_artifact_found: fail

      - name: Compute rust sidecar fingerprint
        id: rust-fingerprint
        run: bun run scripts/ci/rust-sidecar-fingerprint.ts

      - name: Restore rust sidecar cache
        id: rust-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/geom-sidecar/target
          key: rust-sidecar-${{ runner.os }}-${{ steps.rust-fingerprint.outputs.rustc_version }}-${{ steps.rust-fingerprint.outputs.rust_sidecar_fingerprint }}
          restore-keys: |
            rust-sidecar-${{ runner.os }}-${{ steps.rust-fingerprint.outputs.rustc_version }}-
            rust-sidecar-${{ runner.os }}-

      - name: Report rust sidecar change status
        id: rust-sidecar-change
        run: bun run scripts/ci/report-rust-sidecar-change.ts
        env:
          PREVIOUS_RUST_METADATA_PATH: .previous-artifact/rust-sidecar-metadata.json
          RUST_SIDECAR_CACHE_HIT: ${{ steps.rust-cache.outputs.cache-hit }}

      - name: Install system tools for pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool gdal-bin tippecanoe unzip

      - name: Build rust geom sidecar
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          cargo build --release --manifest-path rust/geom-sidecar/Cargo.toml
          end_epoch="$(date +%s)"
          build_seconds="$((end_epoch - start_epoch))"
          echo "RUST_SIDECAR_BUILD_SECONDS=${build_seconds}" >> "$GITHUB_ENV"
          echo "Rust sidecar build duration: ${build_seconds}s" | tee -a "$GITHUB_STEP_SUMMARY"

      # Phase 1: attempt source downloads without fallback artifacts to minimize cache transfers.
      - name: Download pipeline sources (fresh-first)
        id: download-phase
        continue-on-error: true
        timeout-minutes: 180
        run: |
          echo "### Fresh-first source download attempt" >> "$GITHUB_STEP_SUMMARY"
          echo "- Goal: complete downloads from upstream sources without restoring fallback artifacts." >> "$GITHUB_STEP_SUMMARY"
          echo "- Why: avoid unnecessary artifact downloads when upstream fetch succeeds." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Download cache decisions" >> "$GITHUB_STEP_SUMMARY"
          bun run pipeline:nightly:download
        env:
          CI: '1'
          RUST_GEOM_BIN: ${{ github.workspace }}/rust/geom-sidecar/target/release/geom-sidecar

      # Phase 2 (conditional): restore minimal fallback inputs needed for a retry.
      # These are intentionally split by source scope (OSM + official) so we keep artifact transfer bounded.
      - name: Download previous OSM cache scope
        if: steps.download-phase.outcome == 'failure'
        id: previous-osm-cache
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: data-refresh.yml
          branch: main
          name: source-cache-osm-last-good
          search_artifacts: true
          path: .previous-artifact
          if_no_artifact_found: fail

      - name: Download previous official source cache scope
        if: steps.download-phase.outcome == 'failure'
        id: previous-official-cache
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: data-refresh.yml
          branch: main
          name: source-cache-official-last-good
          search_artifacts: true
          path: .previous-artifact
          if_no_artifact_found: fail

      # Phase 3 (conditional): rerun the download phase with restored fallback scopes available.
      # This preserves fresh-first behavior while still allowing resilient continuation when upstream fetches fail.
      - name: Retry download pipeline sources with fallback scopes
        if: steps.download-phase.outcome == 'failure'
        timeout-minutes: 180
        run: |
          echo "### Fallback-assisted retry" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: fresh-first attempt failed." | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- Action: restore scoped cache artifacts and retry download phase." | tee -a "$GITHUB_STEP_SUMMARY"
          bun run pipeline:nightly:download
        env:
          CI: '1'
          FALLBACK_RUNTIME_ROOT: ${{ github.workspace }}/.previous-artifact
          RUST_GEOM_BIN: ${{ github.workspace }}/rust/geom-sidecar/target/release/geom-sidecar

      - name: Normalize runtime source metadata (single canonical state)
        run: bun run migrate:source-metadata
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Extract and prepare geometry
        timeout-minutes: 90
        run: bun run pipeline:nightly:extract
        env:
          CI: '1'
          FALLBACK_RUNTIME_ROOT: ${{ github.workspace }}/.previous-artifact
          RUST_GEOM_BIN: ${{ github.workspace }}/rust/geom-sidecar/target/release/geom-sidecar

      - name: Mark compare start time
        run: |
          echo "COMPARE_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "COMPARE_START_UTC=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Compare boundaries
        timeout-minutes: 210
        run: |
          echo "### Compare phase" >> "$GITHUB_STEP_SUMMARY"
          if ! bun run pipeline:nightly:compare; then
            echo "Compare phase failed, retrying once in 60s..." | tee -a "$GITHUB_STEP_SUMMARY"
            sleep 60
            bun run pipeline:nightly:compare
          fi
        env:
          CI: '1'
          FALLBACK_RUNTIME_ROOT: ${{ github.workspace }}/.previous-artifact
          RUST_GEOM_BIN: ${{ github.workspace }}/rust/geom-sidecar/target/release/geom-sidecar

      - name: Compare timing diagnostics
        if: always()
        run: |
          compare_end_epoch="$(date +%s)"
          echo "### Compare phase timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- start_utc: ${COMPARE_START_UTC:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- end_utc: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${COMPARE_START_EPOCH:-}" ]; then
            elapsed_seconds="$((compare_end_epoch - COMPARE_START_EPOCH))"
            elapsed_minutes="$((elapsed_seconds / 60))"
            elapsed_remainder_seconds="$((elapsed_seconds % 60))"
            echo "- approx_duration: ${elapsed_minutes}m ${elapsed_remainder_seconds}s (${elapsed_seconds}s)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- approx_duration: unknown" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify temporary cleanup
        run: bun run scripts/ci/verify-temp-cleanup.ts

      - name: Prepare static report snapshot
        run: bun run report:sync-runtime-assets

      - name: Validate snapshot output
        run: bun run scripts/ci/validate-refresh-snapshot.ts

      - name: Persist snapshots history to main
        if: github.ref_name == 'main'
        env:
          COMMIT_MSG: 'chore(data): refresh snapshots history'
        run: |
          set -euo pipefail
          git switch -c snapshots-history
          git add ':(glob)datasets/*/snapshots.json'
          if git diff --cached --quiet; then
            echo "No snapshot history changes to commit."
            exit 0
          fi

          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "$COMMIT_MSG"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Stage runtime artifact payload
        run: bun run scripts/ci/stage-runtime-artifact-payload.ts
        env:
          RUST_SIDECAR_CACHE_HIT: ${{ steps.rust-cache.outputs.cache-hit }}
          RUST_SIDECAR_CHANGE_STATUS: ${{ steps.rust-sidecar-change.outputs.rust_sidecar_change_status }}
          RUST_SIDECAR_PREVIOUS_FINGERPRINT: ${{ steps.rust-sidecar-change.outputs.rust_sidecar_previous_fingerprint }}

      - name: Stage slim report runtime artifact
        run: bun run scripts/ci/stage-report-runtime-artifact.ts

      - name: Audit artifact ownership and no-dup contract
        run: bun run scripts/ci/audit-artifact-ownership.ts

      - name: Cache scope summary
        run: |
          echo "### Cache scope summary" >> "$GITHUB_STEP_SUMMARY"
          if [ -f ".artifact-runtime/cache-scopes-summary.md" ]; then
            cat ".artifact-runtime/cache-scopes-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Cache summary file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.REPORT_RUNTIME_ARTIFACT_NAME }}
          path: .artifact-runtime-report
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 4

      - name: Upload scoped OSM source cache artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-cache-osm-last-good
          path: .artifact-runtime/scopes/source-cache-osm
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 3

      - name: Upload scoped official source cache artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-cache-official-last-good
          path: .artifact-runtime/scopes/source-cache-official
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 4

      - name: Upload rust sidecar metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-sidecar-metadata-last-good
          path: rust-sidecar-metadata.json
          if-no-files-found: warn
          retention-days: 4

      - name: Final run diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### Run context diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_id: $GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_attempt: $GITHUB_RUN_ATTEMPT" >> "$GITHUB_STEP_SUMMARY"
          echo "- event: $GITHUB_EVENT_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref_name: $GITHUB_REF_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- actor: $GITHUB_ACTOR" >> "$GITHUB_STEP_SUMMARY"
          echo "- compare_start_utc: ${COMPARE_START_UTC:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Recent data-refresh runs" >> "$GITHUB_STEP_SUMMARY"
          if gh run list --workflow "data-refresh.yml" -L 5 --json databaseId,status,conclusion,createdAt,event,headBranch > /tmp/recent-data-refresh-runs.json; then
            cat /tmp/recent-data-refresh-runs.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Unable to fetch recent runs via gh CLI." >> "$GITHUB_STEP_SUMMARY"
          fi
