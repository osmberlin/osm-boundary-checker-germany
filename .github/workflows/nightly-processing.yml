name: Nightly Processing

# Re-enable the schedule block when the processing server is configured (SSH_HOST, SSH_USER,
# SSH_KEY, SERVER_APP_DIR, etc.). Until then, run manually via Actions → this workflow → Run workflow.
on:
  # schedule:
  #   - cron: "0 1 * * *" # 01:00 UTC daily
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger nightly pipeline
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "cd \"${APP_DIR}\" && docker compose run --rm pipeline"
